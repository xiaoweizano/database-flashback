name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build linux/amd64
        run: |
          mkdir -p dist/agent_linux_amd64 dist/server_linux_amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/agent_linux_amd64/mysql-pitr-agent ./cmd/agent
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/server_linux_amd64/mysql-pitr-server ./cmd/server

      - name: Build linux/arm64
        run: |
          mkdir -p dist/agent_linux_arm64 dist/server_linux_arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/agent_linux_arm64/mysql-pitr-agent ./cmd/agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/server_linux_arm64/mysql-pitr-server ./cmd/server

      - name: Package binaries
        run: |
          cd dist
          tar czf mysql-pitr-agent-linux-amd64.tar.gz -C agent_linux_amd64 mysql-pitr-agent
          tar czf mysql-pitr-server-linux-amd64.tar.gz -C server_linux_amd64 mysql-pitr-server
          tar czf mysql-pitr-agent-linux-arm64.tar.gz -C agent_linux_arm64 mysql-pitr-agent
          tar czf mysql-pitr-server-linux-arm64.tar.gz -C server_linux_arm64 mysql-pitr-server

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*.tar.gz

  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (agent)
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-agent
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Docker meta (server)
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [goreleaser, docker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                {"title": "## 🚀 Features", "labels": ["feature", "enhancement"]},
                {"title": "## 🐛 Bug Fixes", "labels": ["bug", "fix"]},
                {"title": "## 📚 Documentation", "labels": ["documentation", "docs"]},
                {"title": "## 🧹 Maintenance", "labels": ["chore", "dependencies", "refactor"]}
              ],
              "label_extractor": [
                {"pattern": "^(\\w+)[:\\(]"}
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.tar.gz
